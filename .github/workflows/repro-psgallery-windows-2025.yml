name: Repro PSGallery missing on windows-2025

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  psgallery-repro:
    name: repro-attempt-${{ matrix.attempt }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reproduce PSGallery issue
        shell: pwsh
        run: |
          .\scripts\repro-psgallery-windows-2025.ps1 -Attempt '${{ matrix.attempt }}'

      - name: Upload repro logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psgallery-repro-attempt-${{ matrix.attempt }}
          path: psgallery-repro-attempt-${{ matrix.attempt }}.log
          if-no-files-found: warn